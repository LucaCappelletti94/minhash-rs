name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-version:
    name: Verify tag matches version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check tag against Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          echo "tag version: $tag"
          echo "manifest version: $manifest"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::tag $tag does not match Cargo.toml version $manifest"
            exit 1
          fi

  check:
    name: Wait for CI
    needs: verify-version
    runs-on: ubuntu-latest

    steps:
      - name: Wait for CI to finish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for i in $(seq 1 30); do
            STATUS=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/status \
              --jq '.state')
            if [ "$STATUS" = "success" ]; then
              echo "CI passed."
              exit 0
            fi
            if [ "$STATUS" = "failure" ] || [ "$STATUS" = "error" ]; then
              echo "CI failed with status $STATUS. Aborting release."
              exit 1
            fi
            echo "Still pending (attempt $i/30)..."
            sleep 60
          done
          echo "Timed out waiting for CI. Aborting release."
          exit 1

  publish:
    name: Publish to crates.io
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
