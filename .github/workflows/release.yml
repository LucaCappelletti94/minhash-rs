name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # Wait for all status checks on the tagged commit to pass before
  # allowing the publish to proceed. This prevents publishing from
  # commits that haven't finished CI or have failed jobs.
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check commit status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Query the combined status for the tagged commit.
          # Fails the job if the state is not "success".
          STATUS=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/status \
            --jq '.state')
          if [ "$STATUS" != "success" ]; then
            echo "Commit status is $STATUS, not success. Aborting release."
            exit 1
          fi

  publish:
    needs: check
    runs-on: ubuntu-latest

    environment: crates.io
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - uses: actions/checkout@v4
      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Verify package before publishing
        run: cargo publish --dry-run --allow-dirty
      - name: Publish to crates.io
        # Requires CARGO_REGISTRY_TOKEN to be set via the
        # CARGO_REGISTRY_TOKEN environment variable (from the
        # CARGO_REGISTRY_TOKEN secret). Skip the step if the token is
        # not configured yet.
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: cargo publish
