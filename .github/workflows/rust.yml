name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Install Clippy
        run:
          rustup toolchain install nightly --component clippy
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose
      - name: Run clippy
        # Lint levels (clippy all/pedantic/cargo, missing_docs, ...) are set in
        # the [lints] table in Cargo.toml. -D warnings turns any remaining
        # warning into a hard error across every target.
        run: cargo clippy --all-targets --all-features -- -D warnings

  no-std:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install nightly with bare-metal targets
        run: |
          rustup toolchain install nightly
          rustup default nightly
          rustup target add x86_64-unknown-none thumbv6m-none-eabi
      - name: Build for a no_std target with atomics
        # Building the library and its dependency graph for a target with no std
        # available guarantees the crate stays no_std.
        run: cargo build --target x86_64-unknown-none
      - name: Build for a no_std target without atomics
        # thumbv6m has no atomic CAS, so this checks the target_has_atomic gating:
        # the core sketch must compile even when the atomic API is unavailable.
        run: cargo build --target thumbv6m-none-eabi

  msrv:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install the minimum supported Rust version
        run: |
          rustup toolchain install 1.75.0 --profile minimal
          rustup default 1.75.0
      - name: Build on the MSRV
        run: cargo build

  miri:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install nightly with Miri
        run: |
          rustup toolchain install nightly --component miri
          rustup default nightly
          cargo miri setup
      - name: Run Miri
        # Scope to the lib and the atomic soundness tests (every word width). The
        # test_jaccard integration test is a heavy benchmark (large sets, file
        # I/O) that is unsuitable for the Miri interpreter.
        run: cargo miri test --lib --test test_atomic --test test_atomic_variants

  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit
      - name: Audit dependencies for known vulnerabilities
        # Checks the dependency tree against the RustSec advisory database.
        # --deny warnings also fails on unmaintained crates and yanked versions,
        # not just on outright vulnerabilities.
        run: cargo audit --deny warnings

  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install nightly with llvm-tools-preview
        run: |
          rustup toolchain install nightly --component llvm-tools-preview
          rustup default nightly
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage (lcov)
        run: cargo llvm-cov --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
